name: Deploy to Alibaba Cloud

on:
  push:
    branches:
      - develop    # Auto deploy to DEV
      - release/*  # Manual deploy to TEST/PROD
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - dev
          - test
          - prod
      ref:
        description: 'Git ref to deploy'
        required: true
        default: 'main'

env:
  REGISTRY: registry.cn-shanghai.aliyuncs.com
  IMAGE_NAME: coka/app

jobs:
  # ============================================
  # Build Job
  # ============================================
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
      
      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================
  # Deploy to DEV (Auto)
  # ============================================
  deploy-dev:
    needs: build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: dev
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure Aliyun CLI
        uses: aliyun/aliyun-cli-github-action@master
        with:
          configure: |
            ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
            ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
            cn-shanghai
      
      - name: Deploy to ACK (Dev Cluster)
        run: |
          aliyun cs POST clusters/${{ secrets.ACK_DEV_CLUSTER_ID }}/apps \
            --header Content-Type=application/json \
            --body "{
              \"name\": \"coka-app\",
              \"template_id\": \"${{ github.sha }}\",
              \"namespace\": \"default\",
              \"timeout\": 300
            }"
      
      - name: Run database migrations
        run: |
          aliyun cs GET clusters/${{ secrets.ACK_DEV_CLUSTER_ID }}/user_config \
            | base64 -d > kubeconfig
          kubectl --kubeconfig=kubeconfig apply -f k8s/migrations/
      
      - name: Health check
        run: |
          for i in {1..30}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://dev.coka.com/health)
            if [ "$status" = "200" ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "⏳ Waiting for service... ($i/30)"
            sleep 10
          done
          echo "❌ Health check failed"
          exit 1

  # ============================================
  # Deploy to TEST (Manual Approval)
  # ============================================
  deploy-test:
    needs: build
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    environment: 
      name: test
      url: https://test.coka.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure Aliyun CLI
        uses: aliyun/aliyun-cli-github-action@master
        with:
          configure: |
            ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
            ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
            cn-shanghai
      
      - name: Deploy to ECS (Test)
        run: |
          # Update ECS instances with new Docker image
          aliyun ecs RunCommand \
            --InstanceId i-test-001,i-test-002,i-test-003,i-test-004 \
            --Type RunShellScript \
            --CommandContent "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} && docker stop coka-app && docker run -d --name coka-app -p 3000:3000 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
      
      - name: Run integration tests
        run: |
          npm run test:integration -- --baseUrl https://test.coka.com
      
      - name: Run performance tests
        run: |
          npm run test:perf -- --baseUrl https://test.coka.com --thresholds 'http_req_duration{p99}<500'

  # ============================================
  # Deploy to PROD (Manual Approval + Blue-Green)
  # ============================================
  deploy-prod:
    needs: [build, deploy-test]
    if: startsWith(github.ref, 'refs/heads/release/') && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: 
      name: prod
      url: https://www.coka.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure Aliyun CLI
        uses: aliyun/aliyun-cli-github-action@master
        with:
          configure: |
            ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
            ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
            cn-shanghai
      
      - name: Deploy to Green Environment
        run: |
          # Deploy to green ECS instances
          aliyun ecs RunCommand \
            --InstanceId i-prod-green-001,i-prod-green-002,i-prod-green-003 \
            --Type RunShellScript \
            --CommandContent "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} && docker stop coka-app && docker run -d --name coka-app -p 3000:3000 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
      
      - name: Health Check (Green)
        run: |
          for i in {1..30}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://i-prod-green-001:3000/health)
            if [ "$status" = "200" ]; then
              echo "✅ Green environment healthy"
              exit 0
            fi
            echo "⏳ Waiting for green environment... ($i/30)"
            sleep 10
          done
          echo "❌ Green environment health check failed"
          exit 1
      
      - name: Switch Traffic to Green (10%)
        run: |
          aliyun slb SetBackendServers \
            --LoadBalancerId slb-prod-001 \
            --BackendServers "[{\"ServerId\":\"i-prod-green-001\",\"Weight\":10},{\"ServerId\":\"i-prod-green-002\",\"Weight\":10},{\"ServerId\":\"i-prod-green-003\",\"Weight\":10},{\"ServerId\":\"i-prod-blue-001\",\"Weight\":90},{\"ServerId\":\"i-prod-blue-002\",\"Weight\":90},{\"ServerId\":\"i-prod-blue-003\",\"Weight\":90}]"
      
      - name: Monitor Metrics (5 minutes)
        run: |
          echo "Monitoring error rates and latency for 5 minutes..."
          sleep 300
          # Check CloudMonitor for errors
          # If error rate > 1%, rollback
      
      - name: Switch Traffic to Green (100%)
        run: |
          aliyun slb SetBackendServers \
            --LoadBalancerId slb-prod-001 \
            --BackendServers "[{\"ServerId\":\"i-prod-green-001\",\"Weight\":100},{\"ServerId\":\"i-prod-green-002\",\"Weight\":100},{\"ServerId\":\"i-prod-green-003\",\"Weight\":100}]"
      
      - name: Update Terraform State
        run: |
          cd terraform/environments/prod
          terraform init
          terraform apply -auto-approve -var="active_environment=green"
      
      - name: Notify Success
        if: success()
        run: |
          curl -X POST ${{ secrets.DINGTALK_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"Coka 生产环境发布成功\",
                \"text\": \"## ✅ Coka 生产环境发布成功\\n\\n- **版本:** ${{ github.sha }}\\n- **环境:** 生产环境\\n- **时间:** $(date)\\n- **部署策略:** 蓝绿部署\\n\\n🎉 发布完成！\"
              }
            }"
      
      - name: Notify Failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.DINGTALK_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"❌ Coka 生产环境发布失败\",
                \"text\": \"## ❌ Coka 生产环境发布失败\\n\\n- **版本:** ${{ github.sha }}\\n- **环境:** 生产环境\\n- **时间:** $(date)\\n\\n🚨 请立即检查！\"
              }
            }"

  # ============================================
  # Rollback Job
  # ============================================
  rollback:
    if: failure() && needs.deploy-prod.result == 'failure'
    needs: deploy-prod
    runs-on: ubuntu-latest
    
    steps:
      - name: Rollback to Blue
        run: |
          aliyun slb SetBackendServers \
            --LoadBalancerId slb-prod-001 \
            --BackendServers "[{\"ServerId\":\"i-prod-blue-001\",\"Weight\":100},{\"ServerId\":\"i-prod-blue-002\",\"Weight\":100},{\"ServerId\":\"i-prod-blue-003\",\"Weight\":100}]"
        
      - name: Notify Rollback
        run: |
          curl -X POST ${{ secrets.DINGTALK_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"🔄 Coka 生产环境已回滚\",
                \"text\": \"## 🔄 Coka 生产环境已回滚\\n\\n- **回滚时间:** $(date)\\n- **原因:** 发布失败\\n\\n✅ 已回滚到蓝色环境\"
              }
            }"
